<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaTrust – Cryptovaluta Overzicht</title>

  <!-- SEO -->
  <meta name="description" content="Volg live cryptoprijzen en beleg in Bitcoin, Ethereum en meer via NovaTrust. Koop en verkoop crypto direct vanuit uw account.">
  <meta name="keywords" content="NovaTrust crypto, Bitcoin kopen, Ethereum, cryptovaluta beleggen">
  <meta name="robots" content="noindex, nofollow">

  <link rel="stylesheet" href="assets/css/dashboard.css">
</head>
<body class="body-crypto">

<header class="header">
  <div class="brand">
    <img src="assets/img/novatrustlogo.png" alt="NovaTrust Logo" class="logo" width="38" height="38">
    <div>
      <h1>Novatrust</h1>
      <p>Cryptovaluta overzicht</p>
    </div>
  </div>
  <div class="header-actions">
    <button class="nav-btn" onclick="window.location.href='dashboard.html'">Dashboard ↩</button>
  </div>
</header>

<h1>Cryptovaluta Overzicht</h1>
<h2>Saldo: €<span id="balance">1000</span></h2>

<div id="prices">
  <p id="btc">Bitcoin: €90000</p>
  <p id="eth">Ethereum: €4800</p>
  <p id="ltc">Litecoin: €250</p>
</div>

<select id="coin">
  <option value="btc">Bitcoin</option>
  <option value="eth">Ethereum</option>
  <option value="ltc">Litecoin</option>
</select>

<input type="number" id="amount" placeholder="Bedrag in €">

<button onclick="buy()">Kopen</button>
<button onclick="sell()">Verkopen</button>

<h2>Investeringen</h2>
<ul id="portfolio"></ul>

<script src="assets/js/Crypto.js"></script>
</body>
</html>
