<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaTrust – Inloggen</title>

  <!-- SEO -->
  <meta name="description" content="Log in op uw NovaTrust account en beheer uw rekeningen, transacties en beleggingen veilig online.">
  <meta name="keywords" content="NovaTrust inloggen, bankieren online, account login">
  <meta name="robots" content="noindex, nofollow">

  <!-- Open Graph -->
  <meta property="og:title" content="NovaTrust – Inloggen">
  <meta property="og:description" content="Log veilig in op uw NovaTrust bankaccount.">
  <meta property="og:type" content="website">

  <link rel="canonical" href="login.html">
  <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>

<div class="container">
  <img src="assets/img/novatrustlogo.png" alt="NovaTrust Logo" class="logo" width="90">
  <a href="index.html" class="back-home">← Home</a>

  <h1>Inloggen</h1>
  <p class="subtitle">Welkom terug. Log in om door te gaan.</p>

  <form id="loginForm">
    <input
      type="text"
      id="gebruikersnaam"
      placeholder="Gebruikersnaam"
      autocomplete="username"
      required
    >
    <input
      type="password"
      id="wachtwoord"
      placeholder="Wachtwoord"
      autocomplete="current-password"
      required
    >
    <a class="forgot" href="#">Wachtwoord vergeten?</a>
    <button type="submit" id="inlogsubmit">Login</button>
  </form>

  <p id="notification"></p>
  <p>Nog geen account? <a href="signup.html">Registreren</a></p>
</div>

<script src="assets/js/app.js"></script>
</body>
</html>
