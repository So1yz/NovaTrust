<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaTrust – Account Aanmaken</title>

  <!-- SEO -->
  <meta name="description" content="Maak gratis een NovaTrust account aan en begin vandaag nog met veilig bankieren, sparen en beleggen.">
  <meta name="keywords" content="NovaTrust registreren, account aanmaken, gratis bankrekening">
  <meta name="robots" content="index, follow">

  <!-- Open Graph -->
  <meta property="og:title" content="NovaTrust – Account Aanmaken">
  <meta property="og:description" content="Registreer nu en beheer uw financiën veilig met NovaTrust.">
  <meta property="og:type" content="website">

  <link rel="canonical" href="signup.html">
  <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>
  <div class="container">
    <img src="assets/img/novatrustlogo.png" alt="NovaTrust Logo" class="logo" width="90">
    <a href="index.html" class="back-home">← Home</a>

    <h1>Registreren</h1>

    <form action="login.html" method="GET">
      <input type="text" placeholder="Volledige naam" autocomplete="name" required>
      <input type="email" placeholder="E-mail" autocomplete="email" required>
      <input type="password" placeholder="Wachtwoord" autocomplete="new-password" required>
      <button type="submit">Account maken</button>
    </form>

    <p>Heb je al een account? <a href="login.html">Inloggen</a></p>
  </div>
</body>
</html>
